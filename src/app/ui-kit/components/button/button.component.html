<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  class="ms-button"
  [class.ms-button--primary]="variant() === 'primary'"
  [class.ms-button--secondary]="variant() === 'secondary'"
  [class.ms-button--ghost]="variant() === 'ghost'"
  [class.ms-button--full]="fullWidth()"
>
  @if (loading()) {
    <span class="ms-button__loader"></span>
  } @else {
    <span class="ms-button__content">
      <ng-content />
      @if (variant() === 'primary') {
        <span class="ms-button__arrow">→</span>
      }
    </span>
  }
</button>
