<input
    type="text"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [tabIndex]="tabIndex()"
    [readonly]="readonly()"
    [class.invalid]="invalid()"
    [attr.aria-invalid]="invalid()"
    [value]="value()"
    (input)="value.set($event.target.value)"
    (focus)="touched.set(true)"
/>
