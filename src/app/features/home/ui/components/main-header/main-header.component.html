<header class="main-header">
    <div class="main-header__top">
        <div class="main-header__brand">
            <div class="brand-mark">
                <img src="/images/msaver-logo.png" alt="MSaver" width="54" height="54" />
            </div>

            <div class="brand-copy">
                <span class="brand-name">MSaver</span>
                <span class="brand-caption">
                    @if (userName()) {
                        Добрый день, {{ userName() }}
                    } @else {
                        Добрый день
                    }
                </span>
            </div>
        </div>

        <div class="main-header__actions">
            <button
                type="button"
                class="header-icon-button"
                data-testid="settings-button"
                (click)="settings.emit()"
                aria-label="Настройки"
            >
                <span class="material-symbols-outlined">settings</span>
            </button>

            <button
                type="button"
                class="logout-button"
                data-testid="logout-button"
                (click)="logout.emit()"
                aria-label="Выйти"
            >
                <span class="material-symbols-outlined">logout</span>
                <span>Выйти</span>
            </button>
        </div>
    </div>

    <div class="main-header__bottom">
        <div class="period-switcher">
            <button
                type="button"
                class="icon-button"
                (click)="previousMonth.emit()"
                aria-label="Предыдущий месяц"
            >
                <span class="material-symbols-outlined">chevron_left</span>
            </button>

            <div class="period-copy">
                <span class="period-label">{{ monthLabel() }}</span>
            </div>

            <button
                type="button"
                class="icon-button"
                (click)="nextMonth.emit()"
                aria-label="Следующий месяц"
            >
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>

        <ms-button variant="primary" (onClick)="addTransaction.emit()">
            Добавить транзакцию
        </ms-button>
    </div>
</header>
