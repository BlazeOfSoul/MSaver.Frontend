<section class="settings-layout">
    <article class="panel settings-hero">
        <div>
            <h2>Валюта приложения</h2>
            <p>
                Основная валюта используется для баланса, аналитики, переводов и сводных графиков.
            </p>
        </div>

        <div class="currency-preview">
            <span class="currency-preview__code">{{ applicationCurrencyCode() }}</span>
            <strong>{{ applicationCurrencyLabel() }}</strong>
            <span>
                @if (primaryAccount()) {
                    Основной счёт: {{ primaryAccount().name }}
                } @else {
                    Основной счёт ещё не создан
                }
            </span>
        </div>

        <ms-select
            label="Валюта"
            [options]="currencyOptions()"
            [value]="applicationCurrencyCode()"
            [disabled]="saving()"
            (valueChange)="updateApplicationCurrency($event)"
        ></ms-select>
    </article>
</section>
