<label class="ms-select">
    @if (label()) {
    <span class="ms-select__label">{{ label() }}</span>
    }

    <div class="ms-select__shell" [class.ms-select__shell--open]="isOpen()">
        <button
            type="button"
            class="ms-select__trigger"
            [disabled]="disabled()"
            [attr.aria-expanded]="isOpen()"
            (click)="toggle()"
        >
            <span
                class="ms-select__value"
                [class.ms-select__value--placeholder]="!value()"
                [style.--option-color]="selectedOption()?.color || null"
            >
                @if (selectedOption()?.color) {
                <span class="ms-select__dot" aria-hidden="true"></span>
                } {{ selectedOption()?.label || placeholder() }}
            </span>

            <span class="material-symbols-outlined ms-select__icon" aria-hidden="true">
                {{ icon() }}
            </span>
        </button>

        @if (isOpen()) {
        <div class="ms-select__dropdown">
            @if (searchable()) {
            <div class="ms-select__search" (click)="$event.stopPropagation()">
                <span class="material-symbols-outlined ms-select__search-icon" aria-hidden="true">
                    search
                </span>
                <input
                    #searchInput
                    type="text"
                    class="ms-select__search-input"
                    autocomplete="off"
                    [value]="searchText()"
                    [placeholder]="searchPlaceholder() || placeholder() || label()"
                    [attr.aria-label]="searchPlaceholder() || label() || placeholder()"
                    (input)="onSearchInput($event)"
                    (keydown.enter)="$event.preventDefault()"
                />
            </div>
            }

            @for (option of filteredOptions(); track option.value) {
            <button
                type="button"
                class="ms-select__option"
                [class.ms-select__option--selected]="option.value === value()"
                [style.--option-color]="option.color || null"
                (click)="selectOption(option)"
            >
                <span class="ms-select__option-label">
                    @if (option.color) {
                    <span class="ms-select__dot" aria-hidden="true"></span>
                    }
                    <span class="ms-select__option-copy">
                        <span>{{ option.label }}</span>
                        @if (option.description) {
                        <span class="ms-select__option-description">
                            {{ option.description }}
                        </span>
                        }
                    </span>
                </span>

                @if (option.value === value()) {
                <span class="material-symbols-outlined">check</span>
                }
            </button>
            } @empty {
            @if (emptyText()) {
            <div class="ms-select__empty">{{ emptyText() }}</div>
            }
            }
        </div>
        }
    </div>
</label>
