services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: MSaverDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - msaver-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MSaverDb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../MSaver
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=database;Port=5432;Database=MSaverDb;Username=postgres;Password=postgres
      Cors__FrontendOrigins__0: http://localhost:4500
      Cors__FrontendOrigins__1: http://127.0.0.1:4500
      Cors__FrontendOrigins__2: http://localhost:4200
      Cors__FrontendOrigins__3: http://127.0.0.1:4200
      ExchangeRateApi__ApiKey: ${EXCHANGE_RATE_API_KEY:-be629b6a418691a888a9ba41}
      ExchangeRateApi__CacheDurationHours: 24
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "5200:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4500:80"

volumes:
  msaver-postgres-data:
